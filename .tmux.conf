set -g default-terminal "tmux-256color"
set -g allow-passthrough on
set -as terminal-features ',xterm-256color:RGB'
# set -as terminal-overrides ',xterm-256color:sitm=\E[3m'
set -as terminal-overrides ',xterm-ghostty:sitm=\E[3m:ritm=\E[23m'

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind r
bind r source-file ~/.tmux.conf

unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

set -g set-clipboard on

# Mouse support
set -g mouse on
# Option+arrow pane switching (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1
# Increase scrollback
set -g history-limit 50000
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
bind-key -n S-Enter send-keys C-J

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# Plugins
set -g @plugin 'fabioluciano/tmux-powerkit'
set -g @powerkit_plugins "claude_code,group(datetime,cpuas,ram),git"
# set -g @powerkit_theme "spacegray"
# set -g @powerkit_theme_variant "dark"
# set -g @powerkit_theme "solarized"
# set -g @powerkit_theme_variant "dark"
set -g @powerkit_theme "snazzy"
set -g @powerkit_theme_variant "default"
# set -g @powerkit_theme "catppuccin"
# set -g @powerkit_theme_variant "mocha"

# set -g @powerkit_plugin_ram_format "percent"
# set -g @powerkit_plugin_ram_format "usage"    # shows 16.7G/32.0G
set -g @powerkit_plugin_ram_format "used"    # shows 16.7G

# Different style for edge separators
# set -g @powerkit_edge_separator_style "rounded"
# set -g @powerkit_status_justify "centre"
# set -g @powerkit_bar_layout "single"
# set -g @powerkit_status_order "session,windows,plugins"

# Choose your separator style
# Replace terminal icon with  when window name contains "Prop"
# set -g @powerkit_inactive_window_icon "#{?#{m:*Prop*,#W},,#{?#{m:*Sports*,#W},󰒸,#{?#{m:*Alerts*,#W},󰛏,#{?#{m:*Honk*,#W},󰇥,}}}}"
# set -g @powerkit_active_window_icon "#{?#{m:*Prop*,#W},,#{?#{m:*Sports*,#W},󰒸,#{?#{m:*Alerts*,#W},󰛏,#{?#{m:*Honk*,#W},󰇥,}}}}"
set -g @powerkit_inactive_window_icon "#{?#{m:*Prop*,#W},,#{?#{m:*Sports*,#W},󰒸,#{?#{m:*Alerts*,#W},󰵂,#{?#{m:*🧪✨*,#W},🌚,}}}}"
set -g @powerkit_active_window_icon "#{?#{m:*Prop*,#W},,#{?#{m:*Sports*,#W},󰒸,#{?#{m:*Alerts*,#W},󰛏,#{?#{m:*🧪✨*,#W},🌝,}}}}"

set -g @powerkit_separator_style "rounded"  # rounded or normal, flame, pixel, honeycomb
# Enable spacing between elements
set -g @powerkit_elements_spacing "false"  # false, true, both, windows, plugins
# Customize update interval
set -g @powerkit_status_interval "5"
# Make it transparent
set -g @powerkit_transparent "true"

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'claude'
set -g @continuum-restore 'off'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

